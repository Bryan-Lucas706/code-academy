<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtubee</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/c57e20663f.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- <i class="fa-solid fa-moon"></i> -->
    <header>
      <div id="menu">
        <i class="fa-solid fa-bars"></i>
        <a href="https://youtube.com" target="_blank"
          ><img src="image/Youtube-Logo.png" alt="Logo do Youtube" width="80"
        /></a>
      </div>
      <div id="pesquisa">
        <div id="barra-pesquisa">
          <input type="text" placeholder="Pesquisar" />
          <button type="submit">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
        <div id="mic"><i class="fa-solid fa-microphone"></i></div>
      </div>
      <div id="perfil">
        <i class="fa-solid fa-video"></i>
        <i class="fa-solid fa-grip"></i>
        <i class="fa-regular fa-bell"></i>
        <img
          src="image/foto-perfil.jpeg"
          alt="Foto de perfil do usuario"
          id="foto-perfil"
        />
      </div>
    </header>
    <nav id="nav-lateral">
      <div id="nav">
        <div><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div><img src="image/shorts.png" alt="" /><span>Shorts</span></div>
        <div>
          <img src="image/subscribe.png" alt="" /><span>Subscriptions</span>
        </div>
        <div><img src="image/library.png" alt="" /><span>Library</span></div>
      </div>
    </nav>
    <main>
      <img
        src="http://yt3.googleusercontent.com/nfXiA_4UIluBCMFWM_3jzbemU2OoRuwCk73c1aEHp6CVg7j3v4MEsXN2AoZCL0aAuHh6U2lq-g=w1707-fcrop64=1,00005a57ffffa5a8-k-c0xffffffff-no-nd-rj"
        alt=""
      />
      <section id="container-canal">
        <div id="canal">
          <img
            src="https://yt3.googleusercontent.com/ytc/AIdro_m-8zZRJBWMwnaHcJgQv2IRr0dLcqCv1yKcQHgSEZ26jHw=s160-c-k-c0x00ffffff-no-rj"
            alt="Imagem do canal do Youtube"
          />
          <div id="info-canal">
            <h1>Curso em Vídeo</h1>
            <span> 2,67 mi de inscritos</span>
          </div>
        </div>
        <button>Inscrever-se</button>
      </section>

      <nav id="nav-canal">
        <span id="home">HOME</span>
        <span>VIDEOS</span>
        <span>PLAYLIST</span>
        <span>COMMUNITY</span>
        <span>STORE</span>
        <span>CHANNELS</span>
        <span>ABOUT</span>
        <i class="fa-solid fa-magnifying-glass"></i>
      </nav>

      <section id="video-destaque"></section>
      <section id="videos"></section>
    </main>
  </body>
</html>
