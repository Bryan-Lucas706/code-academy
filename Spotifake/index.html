<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotifake</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main class="music-container">
      <header>
        <h1>Spotifake</h1>
      </header>

      <img class="capa" id="capa" alt="capa da musica" />
      <audio id="audio"></audio>

      <section class="abaixo-capa">
        <article id="song-info">
          <div class="song-name" id="song-name">Nome da Música</div>
          <div class="band-name" id="band-name">Nome da Banda</div>
        </article>
        <button id="like" class="like">
          <i class="bi bi-heart"></i>
        </button>
      </section>

      <section id="progress-container">
        <div class="barra">
          <div id="progresso" class="progresso"></div>
            <div class="bola"></div>
        </div>
        <div class="time-box">
          <div id="song-time">00:00</div>
          <div id="total-time">00:00</div>
        </div>
      </section>

      <section class="button-container">
        <button id="aleatorio">
          <i class="bi bi-shuffle"></i>
        </button>
        <button id="anterior" class="anterior">
          <i class="bi bi-skip-start-fill"></i>
        </button>
        <button id="play" class="play">
          <i class="bi bi-play-circle-fill"></i>
        </button>
        <button id="proximo" class="proximo">
          <i class="bi bi-skip-end-fill"></i>
        </button>
        <button id="repetir">
          <i class="bi bi-repeat"></i>
        </button>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
